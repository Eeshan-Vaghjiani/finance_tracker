name: finance_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.1.2
  fl_chart: ^1.2.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_sms_inbox: ^1.0.4
  permission_handler: ^12.0.1
  uuid: ^4.5.3
  shared_preferences: ^2.5.4
  google_sign_in: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/wallet_logo.png

flutter_native_splash:
  color: "#0B3B60"
  image: "assets/wallet_logo.png"
  android_12:
    image: "assets/wallet_logo.png"
    icon_background_color: "#0B3B60"
  android: true
  ios: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/wallet_logo.png"
  adaptive_icon_background: "#0B3B60"
  adaptive_icon_foreground: "assets/wallet_logo.png"
